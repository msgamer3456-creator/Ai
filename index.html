<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoaib AI Chatbot</title>
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0a0e27 0%,#16213e 50%,#0f3460 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.chat-container {
    width: 400px;
    height: 600px;
    background: rgba(20,30,60,0.95);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 25px black;
}
.chat-header {
    padding: 20px;
    background: linear-gradient(135deg,#e94560 0%,#ff6b6b 50%,#feca57 100%);
    color: white;
    font-weight: bold;
    font-size: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.messages-area {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 15px;
    word-wrap: break-word;
    font-weight: 500;
}
.user {
    align-self: flex-end;
    background: linear-gradient(135deg,#e94560 0%,#ff6b6b 100%);
    color: white;
    border-bottom-right-radius: 5px;
}
.assistant {
    align-self: flex-start;
    background: rgba(100,150,255,0.2);
    color: #e0e7ff;
    border-bottom-left-radius: 5px;
    backdrop-filter: blur(5px);
}
.input-area {
    padding: 10px;
    display: flex;
    gap: 10px;
    background: rgba(15,25,50,0.9);
}
.input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    color: white;
    background: rgba(30,40,70,0.7);
}
.input-area button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#e94560 0%,#ff6b6b 100%);
    color: white;
    font-weight: bold;
    cursor: pointer;
}
.typing-indicator {
    width: 60px;
    height: 10px;
    display: flex;
    gap: 5px;
}
.typing-indicator span {
    width: 10px;
    height: 10px;
    background: #60a5fa;
    border-radius: 50%;
    animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2){animation-delay:0.2s;}
.typing-indicator span:nth-child(3){animation-delay:0.4s;}
@keyframes typing {
    0%,60%,100%{opacity:0.3; transform: translateY(0);}
    30%{opacity:1; transform: translateY(-8px);}
}
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 Shoaib AI</div>
    <div class="messages-area" id="messagesArea">
        <div class="assistant message">Hi! I'm Shoaib AI. Ask me anything!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const messagesArea = document.getElementById('messagesArea');
const userInput = document.getElementById('userInput');

const dummyResponses = [
    "Interesting! Tell me more 😎",
    "I see… let's explore that 🔥",
    "Hmm, I need to think about it 🤔",
    "Wow! That’s impressive 😳",
    "Can you explain it differently? 💡",
    "Absolutely! Here’s what I think…",
    "LOL, that’s funny 😂",
    "I totally agree with you 👌"
];

function sendMessage(){
    const text = userInput.value.trim();
    if(!text) return;

    // Add user message
    const userDiv = document.createElement('div');
    userDiv.className = 'message user';
    userDiv.innerText = text;
    messagesArea.appendChild(userDiv);
    messagesArea.scrollTop = messagesArea.scrollHeight;
    userInput.value = '';

    // Typing indicator
    const typingDiv = document.createElement('div');
    typingDiv.className = 'assistant message';
    typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    messagesArea.appendChild(typingDiv);
    messagesArea.scrollTop = messagesArea.scrollHeight;

    // Simulate AI typing
    setTimeout(()=>{
        typingDiv.remove();
        const responseDiv = document.createElement('div');
        responseDiv.className = 'assistant message';
        responseDiv.innerText = dummyResponses[Math.floor(Math.random()*dummyResponses.length)];
        messagesArea.appendChild(responseDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }, 1000 + Math.random()*1000);
}
</script>

</body>
</html>
