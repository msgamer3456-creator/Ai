<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shoaib AI</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .chat{
      width:400px;
      height:600px;
      background:#1e293b;
      border-radius:20px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    .header{
      background:#111827;
      color:white;
      padding:15px;
      text-align:center;
      font-weight:bold;
    }

    .messages{
      flex:1;
      padding:10px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      color:white;
    }

    .msg{
      padding:10px;
      margin:6px 0;
      border-radius:10px;
      max-width:80%;
      word-wrap:break-word;
    }

    .user{
      background:#3b82f6;
      align-self:flex-end;
    }

    .bot{
      background:#334155;
      align-self:flex-start;
    }

    .input-area{
      display:flex;
      padding:10px;
      background:#111827;
    }

    input{
      flex:1;
      padding:10px;
      border-radius:10px;
      border:none;
      outline:none;
    }

    button{
      margin-left:8px;
      padding:10px 15px;
      border-radius:10px;
      border:none;
      background:#22c55e;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="chat">
  <div class="header">Shoaib AI 🤖</div>
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

  // 👇 YAHAN APNI NEW API KEY PASTE KARO (quotes ke andar)
  const API_KEY = "AIzaSyAR6hVA_tIcP_Qcc6UE5rejmc0xayhtanE";

  async function send(){
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const text = input.value.trim();
    if(!text) return;

    messages.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    try{
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
        {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({
            contents:[{
              parts:[{ text:text }]
            }]
          })
        }
      );

      const data = await response.json();

      if(!data.candidates){
        messages.innerHTML += `<div class="msg bot">❌ API Error</div>`;
        return;
      }

      const reply = data.candidates[0].content.parts[0].text;
      messages.innerHTML += `<div class="msg bot">${reply}</div>`;
      messages.scrollTop = messages.scrollHeight;

    }catch(e){
      messages.innerHTML += `<div class="msg bot">❌ Network Error</div>`;
    }
  }

  document.getElementById("input").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
      send();
    }
  });

</script>

</body>
</html>
