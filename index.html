<!DOCTYPE html>
<html>
<head>
  <title>Shoaib AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat {
      width: 400px;
      height: 600px;
      background: #1e293b;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      color: white;
    }

    .input {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
    }

    .msg {
      margin: 8px 0;
      padding: 8px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user { background: #3b82f6; align-self: flex-end; }
    .bot { background: #334155; }
  </style>
</head>
<body>

<div class="chat">
  <div class="header">Shoaib AI 🤖</div>
  <div class="messages" id="messages"></div>
  <div class="input">
    <input id="text" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const API_KEY = "AIzaSyAR6hVA_tIcP_Qcc6UE5rejmc0xayhtanE";

async function send() {
  const input = document.getElementById("text");
  const messages = document.getElementById("messages");
  const text = input.value.trim();
  if (!text) return;

  messages.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = "";

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text }] }]
        })
      }
    );

    const data = await response.json();

    if (!data.candidates) {
      messages.innerHTML += `<div class="msg bot">⚠️ API Error: ${JSON.stringify(data)}</div>`;
      return;
    }

    const reply = data.candidates[0].content.parts[0].text;
    messages.innerHTML += `<div class="msg bot">${reply}</div>`;
    messages.scrollTop = messages.scrollHeight;

  } catch (err) {
    messages.innerHTML += `<div class="msg bot">❌ Network Error</div>`;
  }
}
</script>

</body>
</html>
