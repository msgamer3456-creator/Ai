<!DOCTYPE html>
<html>
<head>
  <title>Shoaib AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-box {
      width: 400px;
      height: 600px;
      background: #1e293b;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    .header {
      padding: 15px;
      background: #111827;
      color: white;
      font-size: 18px;
      text-align: center;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
      color: white;
    }

    .bot {
      background: #334155;
      color: white;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="chat-box">
  <div class="header">Shoaib AI 🤖</div>
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const API_KEY = "AIzaSyC_6zsLh66RLprGnSJ26ZlFkxBmvxUC-IM";

async function send() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");
  const text = input.value;

  if (!text) return;

  messages.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: text }] }]
      })
    }
  );

  const data = await response.json();
  const reply = data.candidates[0].content.parts[0].text;

  messages.innerHTML += `<div class="message bot">${reply}</div>`;
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
